name: CLI Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: windows-x64
            archive: iptv-picker-windows-x64.zip
            executable: iptv-picker.exe
            nodeVersion: 24
            nodeArchitecture: x64
            targetPlatform: win32
            targetArch: x64
            packageMode: sea
            bundleFfprobe: true
            allowMissingFfprobe: false
            installFfmpeg: choco install ffmpeg -y --no-progress
          - label: Windows x86
            os: windows-latest
            target: windows-x86
            archive: iptv-picker-windows-x86.zip
            executable: iptv-picker.exe
            nodeVersion: 22
            nodeArchitecture: x86
            targetPlatform: win32
            targetArch: x86
            packageMode: sea
            bundleFfprobe: false
            allowMissingFfprobe: true
            installFfmpeg: ""
          - label: Linux x64
            os: ubuntu-latest
            target: linux-x64
            archive: iptv-picker-linux-x64.tar.gz
            executable: iptv-picker
            nodeVersion: 24
            nodeArchitecture: x64
            targetPlatform: linux
            targetArch: x64
            packageMode: sea
            bundleFfprobe: true
            allowMissingFfprobe: false
            installFfmpeg: sudo apt-get update && sudo apt-get install -y ffmpeg
          - label: Linux x64 musl
            os: ubuntu-latest
            target: linux-x64-musl
            archive: iptv-picker-linux-x64-musl.tar.gz
            executable: iptv-picker
            nodeVersion: 24
            targetPlatform: linux
            targetArch: x64
            targetLibc: musl
            packageMode: sea-musl
            bundleFfprobe: true
            allowMissingFfprobe: false
            installFfmpeg: ""
          - label: Linux x86
            os: ubuntu-latest
            target: linux-x86
            archive: iptv-picker-linux-x86.tar.gz
            executable: iptv-picker
            nodeVersion: 24
            nodeArchitecture: x64
            targetPlatform: linux
            targetArch: x86
            packageMode: node-bundle
            bundleFfprobe: false
            allowMissingFfprobe: true
            installFfmpeg: ""
          - label: macOS x64
            os: macos-15-intel
            target: macos-x64
            archive: iptv-picker-macos-x64.tar.gz
            executable: iptv-picker
            nodeVersion: 24
            nodeArchitecture: x64
            targetPlatform: darwin
            targetArch: x64
            packageMode: sea
            bundleFfprobe: true
            allowMissingFfprobe: false
            installFfmpeg: brew install ffmpeg
          - label: macOS arm64
            os: macos-14
            target: macos-arm64
            archive: iptv-picker-macos-arm64.tar.gz
            executable: iptv-picker
            nodeVersion: 24
            nodeArchitecture: arm64
            targetPlatform: darwin
            targetArch: arm64
            packageMode: sea
            bundleFfprobe: true
            allowMissingFfprobe: false
            installFfmpeg: brew install ffmpeg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.packageMode != 'sea-musl'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodeVersion }}
          architecture: ${{ matrix.nodeArchitecture }}
          cache: npm

      - name: Install dependencies
        if: matrix.packageMode != 'sea-musl'
        run: npm ci

      - name: Install FFmpeg
        if: matrix.packageMode != 'sea-musl' && matrix.installFfmpeg != ''
        run: ${{ matrix.installFfmpeg }}

      - name: Build single executable
        if: matrix.packageMode == 'sea'
        env:
          TARGET_PLATFORM: ${{ matrix.targetPlatform }}
          TARGET_ARCH: ${{ matrix.targetArch }}
          BUNDLE_FFPROBE: ${{ matrix.bundleFfprobe }}
          ALLOW_MISSING_FFPROBE: ${{ matrix.allowMissingFfprobe }}
        run: npm run package:sea

      - name: Build Alpine/musl single executable
        if: matrix.packageMode == 'sea-musl'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e TARGET_PLATFORM="${{ matrix.targetPlatform }}" \
            -e TARGET_ARCH="${{ matrix.targetArch }}" \
            -e TARGET_LIBC="${{ matrix.targetLibc }}" \
            -e BUNDLE_FFPROBE="${{ matrix.bundleFfprobe }}" \
            -e ALLOW_MISSING_FFPROBE="${{ matrix.allowMissingFfprobe }}" \
            -v "$PWD:/work" \
            -w /work \
            node:${{ matrix.nodeVersion }}-alpine \
            sh -lc '
              set -eu
              owner="$(stat -c "%u:%g" /work)"
              cleanup() {
                chown -R "$owner" /work/node_modules /work/release /work/.tmp /work/src/core/bundled-ffprobe.ts 2>/dev/null || true
              }
              trap cleanup EXIT
              apk add --no-cache bash ffmpeg
              bash -lc "set -euo pipefail; npm ci; npm run package:sea"
            '

      - name: Build Node bundle
        if: matrix.packageMode == 'node-bundle'
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          npm prune --omit=dev
          target="release/${{ matrix.target }}"
          mkdir -p "$target"
          cp -R dist node_modules "$target/"
          cp package.json package-lock.json "$target/"
          cat > "$target/${{ matrix.executable }}" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec node "$ROOT/dist/iptv-picker-cli.js" "$@"
          SH
          chmod +x "$target/${{ matrix.executable }}"

      - name: Pack Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $archive = "${{ matrix.archive }}"
          $stage = "release/stage/iptv-picker-$target"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "release/$target/${{ matrix.executable }}" "$stage/${{ matrix.executable }}"
          Copy-Item "README.md" "$stage/README.md"
          Copy-Item "config" "$stage/config" -Recurse
          New-Item -ItemType Directory -Force -Path "$stage/data","$stage/res","$stage/publish" | Out-Null
          Compress-Archive -Path "$stage/*" -DestinationPath "release/$archive" -Force
          Get-FileHash "release/$archive" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $archive" } |
            Set-Content "release/$archive.sha256"

      - name: Pack Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="${{ matrix.archive }}"
          stage="release/stage/iptv-picker-$target"
          mkdir -p "$stage/data" "$stage/res" "$stage/publish"
          cp -R "release/$target/." "$stage/"
          chmod +x "$stage/${{ matrix.executable }}"
          cp README.md "$stage/README.md"
          cp -R config "$stage/config"
          tar -C "release/stage" -czf "release/$archive" "iptv-picker-$target"
          shasum -a 256 "release/$archive" | sed "s#release/##" > "release/$archive.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            release/${{ matrix.archive }}
            release/${{ matrix.archive }}.sha256

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag
            }
          }
          gh release upload $tag "release/${{ matrix.archive }}" "release/${{ matrix.archive }}.sha256" --clobber
